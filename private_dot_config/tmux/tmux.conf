# Remap prefix to ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Extended keys (fixes Shift+Enter in Claude Code, etc.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# True color + italics passthrough for nvim themes
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Pass OSC 8 hyperlinks through to the terminal (clickable app-emitted links)
set -ga terminal-features "*:hyperlinks"

# Let nvim react to gained/lost focus (autoread, lualine redraws, etc.)
set -g focus-events on

# Window/pane numbering starts at 1; renumber after a window closes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Pane navigation with prefix + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane splitting with prefix + v (vertical) / b (horizontal); new panes inherit cwd
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind b split-window -v -c "#{pane_current_path}"

# Mouse support: scroll wheel scrolls the buffer (enters copy mode), drag selects
set -g mouse on

# Vi-style copy mode
setw -g mode-keys vi

# v begins selection, y copies to macOS clipboard, Enter copies and exits
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'

# Half-page scroll with plain d/u (vim-style)
bind -T copy-mode-vi d send-keys -X halfpage-down
bind -T copy-mode-vi u send-keys -X halfpage-up

# Mouse drag copies selection but keeps scroll position (doesn't jump to bottom)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe 'pbcopy'

# Prefix + p pastes from tmux buffer; prefix + P pastes from system clipboard
unbind p
bind p paste-buffer
bind P run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Prefix + g: floating scratchpad session (persists across open/close)
bind g display-popup -E -w 80% -h 80% "tmux new-session -A -s scratch"

# Keep plugin runtime state out of the dotfiles repo (XDG data dir)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins/"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# tmux.nvim — seamless pane nav/resize with nvim splits
set -g @plugin 'aserowy/tmux.nvim'
set -g @tmux-nvim-navigation true
set -g @tmux-nvim-navigation-cycle false
set -g @tmux-nvim-resize true
set -g @tmux-nvim-resize-step-x 1
set -g @tmux-nvim-resize-step-y 1

# Status bar:
set -g status-position bottom
set -g status-format[0] "#[align=left]#{E:@catppuccin_status_session}#[align=centre]#{P:#[default] #{?pane_active,#{?window_zoomed_flag,#[fg=#{@thm_crust}#,bg=#{@thm_yellow}] #{pane_index} #[fg=#{@thm_fg}#,bg=#{@thm_surface_1}] #{=10:pane_current_command} ,#[fg=#{@thm_crust}#,bg=#{@thm_blue}] #{pane_index} #[fg=#{@thm_fg}#,bg=#{@thm_surface_1}] #{=10:pane_current_command} },#[fg=#{@thm_crust}#,bg=#{@thm_overlay_2}] #{pane_index} #[fg=#{@thm_fg}#,bg=#{@thm_surface_0}] #{=10:pane_current_command} }}#[align=right]#{W:#{E:window-status-format} ,#{E:window-status-current-format} }"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.local/share/tmux/plugins/tpm/tpm'
